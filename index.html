<!DOCTYPE html>
<html lang="en">

<head>
  
<meta charset="UTF-8">
<title>Adaleya</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">

<style>

/* ================= BACKGROUND VIDEO ================= */
#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* ================= OVERLAY ================= */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  z-index: -1;
  pointer-events: none;
}

/* ================= Hand painted stickers ================= */

.custom-text {
  font-family: 'Cormorant Garamond', serif; /* font */
  font-size: 24px; /* size */
  color: white; /* color */
  text-align: center; /* center it */
  margin-top: 10px; /* controls distance from title */
  text-shadow: 0 0 8px rgba(255,255,255,0.6);
  letter-spacing: 1px;
  font-size: 22px;
}

/* ================= TITLE ================= */
h1 {
  font-family: 'Cormorant Garamond', serif;
  color: white;
  text-shadow: 0 0 10px white;
  text-align: center;
  margin-top: 50px;
  font-size: 68px;
  position: relative;
  z-index: 2;
}

/* ================= LOGO ================= */
#thewaifupie {
  position: absolute;
  top: 50px;
  left: 50%;
  transform: translateX(-50%) rotate(17deg);
  width: 270px;
  z-index: 3;
  pointer-events: none;
}

/* ================= WRAPPER ================= */
.wrapper {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-top: 40px;
  flex-wrap: wrap;
  padding-left: 40px;
  padding-right: 40px;
}

/* ================= CARDS ================= */
.container {
  position: relative;
  width: 200px;
  height: 200px;
  overflow: hidden;
}

/* VIDEO */
.container video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* IMAGE */
.container img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.4s ease;
}

/* HOVER */
.container:hover img {
  opacity: 0;
}

.page {
  display: none;
}

.page.active {
  display: block;
}

.custom-text {
  cursor: pointer; /* makes it clickable */
}


/* STICKER PAGE */
#stickers .wrapper {
  margin-top: 60px;
}
/* PRINT PAGE FIX */
#prints .print-card {
  position: relative;
  width: 250px !important;
  height: 380px !important;
  flex: 0 0 auto; /* prevents stretching */
  overflow: hidden;
  border-radius: 0px;
}

#prints .print-card video,
#prints .print-img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* VIDEO */
.print-card video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* IMAGE */
.print-img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.4s ease;
}

/* HOVER EFFECT */
.print-card:hover .print-img {
  opacity: 0;
}
</style>
</head>


<body> 
<!-- BACKGROUND VIDEO -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="hatsunemiku60video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- ================= HOME ================= -->
<div id="home" class="page active">

  <h1>Adaleya</h1>

  <p class="custom-text" onclick="changePage('stickers')">
    Stickers ✨
  </p>

    <p class="custom-text" onclick="changePage('prints')">
    Prints 
  </p>

  <p class="custom-text" onclick="changePage('skirts')">
    Handmade Skirts 
  </p>

  <p class="custom-text" onclick="changePage('cosplay')">
    My Cosplay Prints 
  </p>

  <img src="thewaifupie.PNG" id="thewaifupie">

  <div class="wrapper">
    <!-- your gallery stays here exactly the same -->
  </div>

</div>
 
<!-- ================= SKIRTS PAGE ================= -->
<div id="skirts" class="page">
  <h1>Handmade Skirts </h1>

  <p class="custom-text" onclick="goHome()">← Back to Home</p>
</div>

<!-- ================= PRINTS PAGE ================= -->
<div id="prints" class="page">
  <h1>Prints</h1>

  <div class="wrapper">

    <div class="print-card">

      <video muted loop>
        <source src="videofruitsheet.mp4" type="video/mp4">
      </video>

      <img src="print-anime-1-gohun.png" class="print-img">

    </div>

  </div>
  <p class="custom-text" onclick="goHome()">← Back to Home</p>
  
</div>

  

<!-- ================= COSPLAY PAGE ================= -->
<div id="cosplay" class="page">
  <h1>My Cosplay Prints </h1>

  <p class="custom-text" onclick="goHome()">← Back to Home</p>
</div>

<!-- ================= STICKERS PAGE ================= -->
<div id="stickers" class="page">

  <h1>Stickers ✨</h1>

  <p class="custom-text" onclick="showPage('home')">
    ← Back to Home
  </p>

  <!-- GALLERY -->
  <div class="wrapper">

    <div class="container">
      <video muted loop>
        <source src="videofruitsheet.mp4" type="video/mp4">
      </video>
      <img src="DSC03944.jpg">
    </div>

    <div class="container">
      <video muted loop>
        <source src="strawberryvideo.mp4" type="video/mp4">
      </video>
      <img src="DSC03968.jpg">
    </div>

    <div class="container">
      <video muted loop>
        <source src="videofruitsheet.mp4" type="video/mp4">
      </video>
      <img src="DSC03944.jpg">
    </div>

  </div>

</div>


<!-- SCRIPT -->

<script>
const containers = document.querySelectorAll('.container');

containers.forEach(container => {
  const video = container.querySelector('video');

  container.addEventListener('mouseenter', () => {
    video.play();
  });

  container.addEventListener('mouseleave', () => {
    video.pause();
    video.currentTime = 0;
  });
});
</script>

<script>
function changePage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

function goHome() {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById("home").classList.add('active');
}
</script>

<script>
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(page => {
    page.classList.remove('active');
  });

  document.getElementById(pageId).classList.add('active');
}
</script>
