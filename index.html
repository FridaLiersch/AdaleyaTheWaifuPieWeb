


<style>
.wrapper {
  display: flex;
  gap: 50px; /* space between the three items */
}

/* EACH ITEM */
.container {
  position: relative;
  width: 300px;
  height: 300px;
  overflow: hidden;
}

/* VIDEO */
.container video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  top: 0;
  left: 0;
}

/* IMAGE */
.container img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  top: 0;
  left: 0;
  transition: opacity 0.4s ease;
}

/* HOVER */
.container:hover img {
  opacity: 0;
}
</style>

<body>

<div class="wrapper">

  <!-- FIRST ITEM -->
  <div class="container">
    <video muted loop>
      <source src="videofruitsheet.mp4" type="video/mp4">
    </video>
    <img src="DSC03944.jpg" alt="cover image">
  </div>

  <!-- SECOND ITEM -->
  <div class="container">
    <video muted loop>
      <source src="strawberryvideo.mp4" type="video/mp4">
    </video>
    <img src="DSC03968.jpg" alt="cover image">
  </div>

  <!-- THIRD ITEM -->
  <div class="container">
    <video muted loop>
      <sourse src="pievideo.mp4" type="video/mp4">
    </video>
    <img src="DSC04049.jpg" alt="cover image">
  </div>

  <!-- FOURTH ITEM-->
  <div class="container">
    <video muted loop>
        <source src="coffeevideo.mp4" type="video/mp4">
    </video>
    <img src="DSC04050.jpg" alt="cover image">
  </div> 

<script>
const containers = document.querySelectorAll('.container');

containers.forEach(container => {
  const video = container.querySelector('video');

  container.addEventListener('mouseenter', () => {
    video.play();
  });

  container.addEventListener('mouseleave', () => {
    video.pause();
    video.currentTime = 0;
  });
});
</script>

</body>
